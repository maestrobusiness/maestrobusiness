<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="refresh" content="8; url=https://maestrobusiness.com.br/">
    <meta name="theme-color" content="#050506">
    <title>404 | Maestro Business</title>
    <style>
      :root {
        --gold: #c8a24e;
        --gold-light: #f1d88b;
        --gold-dark: #73511f;
        --metallic-gold-gradient: linear-gradient(135deg, #76531f 0%, #bf9340 30%, #f1d88b 50%, #c8a24e 68%, #6d4b1d 100%);
        --dark-bg: #050506;
        --graphite: #111214;
        --ink: #f3efe4;
        --muted: rgba(243, 239, 228, 0.68);
        --border-gold-subtle: rgba(200, 162, 78, 0.25);
        --serif: Georgia, "Times New Roman", serif;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 100%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 100%),
          radial-gradient(circle at 28% 18%, rgba(200, 162, 78, 0.11), transparent 34%),
          radial-gradient(circle at 78% 72%, rgba(120, 169, 156, 0.08), transparent 32%),
          linear-gradient(180deg, #070708 0%, var(--dark-bg) 100%);
        background-size: 48px 48px, 96px 96px, auto, auto, auto;
        color: var(--ink);
        font-family: var(--sans);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        content: "";
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='240' height='240' filter='url(%23n)' opacity='0.65'/%3E%3C/svg%3E");
      }

      main {
        width: min(100%, 760px);
        border: 1px solid var(--border-gold-subtle);
        border-radius: 8px;
        padding: clamp(30px, 7vw, 64px);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.02));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46), inset 0 1px rgba(255, 255, 255, 0.06);
        text-align: center;
      }

      img {
        width: 92px;
        height: 92px;
        margin: 0 auto 22px;
        border-radius: 50%;
        object-fit: cover;
        filter: drop-shadow(0 18px 42px rgba(200, 162, 78, 0.22));
      }

      .kicker {
        margin: 0 0 12px;
        color: var(--gold-light);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        background: var(--metallic-gold-gradient);
        background-clip: text;
        color: transparent;
        font-family: var(--serif);
        font-size: clamp(4rem, 17vw, 8.2rem);
        font-weight: 700;
        line-height: 0.9;
        -webkit-background-clip: text;
      }

      h2 {
        margin: 22px 0 0;
        font-family: var(--serif);
        font-size: clamp(1.8rem, 6vw, 3rem);
        font-weight: 600;
        line-height: 1.08;
      }

      p {
        max-width: 560px;
        margin: 18px auto 0;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 32px;
      }

      a,
      button {
        min-height: 48px;
        border-radius: 6px;
        padding: 12px 18px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      .primary {
        border: 1px solid rgba(241, 216, 139, 0.58);
        background: var(--metallic-gold-gradient);
        color: #0d0b07;
        box-shadow: 0 14px 34px rgba(200, 162, 78, 0.18), inset 0 1px rgba(255, 255, 255, 0.36);
      }

      .secondary {
        border: 1px solid var(--border-gold-subtle);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
      }

      .timer {
        margin-top: 24px;
        color: rgba(243, 239, 228, 0.48);
        font-size: 0.84rem;
      }

      @media (max-width: 520px) {
        body {
          padding: 18px;
        }

        main {
          padding: 28px 20px;
        }

        .actions {
          display: grid;
        }

        a,
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="Maestro-logo.png" width="92" height="92" alt="Maestro Business">
      <p class="kicker">Maestro Business</p>
      <h1>404</h1>
      <h2>Página não encontrada.</h2>
      <p>O caminho acessado não está disponível. Você será redirecionado para a página inicial da Maestro Business.</p>
      <div class="actions">
        <a class="primary" href="https://maestrobusiness.com.br/">Voltar para a página inicial</a>
        <button class="secondary" type="button" onclick="history.length > 1 ? history.back() : location.href='https://maestrobusiness.com.br/'">Voltar à página anterior</button>
      </div>
      <p class="timer">Redirecionamento automático em alguns segundos.</p>
    </main>
  </body>
</html>
